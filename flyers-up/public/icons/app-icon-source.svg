<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Shadow filter: y 12px, blur 28px, rgba(0,0,0,0.12) -->
    <filter id="flyer-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- 1) Background: solid #FAF9F6 -->
  <rect width="512" height="512" fill="#FAF9F6"/>
  <!-- 2) Main flyer: 300x340, center (256,256), -6deg, r16 -->
  <g transform="translate(256,256) rotate(-6) translate(-150,-170)">
    <!-- White flyer with shadow -->
    <rect x="0" y="0" width="300" height="340" rx="16" ry="16" fill="#FFFFFF" filter="url(#flyer-shadow)"/>
    <!-- Border: 1px solid rgba(0,0,0,0.05) -->
    <rect x="0.5" y="0.5" width="299" height="339" rx="15.5" ry="15.5" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <!-- 3) Accent: top strip pastel green, ~32px (~6% of flyer height) -->
    <path d="M 16 0 L 284 0 Q 300 0 300 16 L 300 32 L 0 32 L 0 16 Q 0 0 16 0 Z" fill="#DFF5EA"/>
  </g>
</svg>
