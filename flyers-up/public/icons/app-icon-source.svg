<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Board shadow: very subtle -->
    <filter id="board-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <!-- Paper shadow: soft -->
    <filter id="paper-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <!-- Pin shadow -->
    <filter id="pin-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <!-- Subtle wood gradient: hint of grain direction -->
    <linearGradient id="wood-shade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9B078"/>
      <stop offset="50%" stop-color="#D2A679"/>
      <stop offset="100%" stop-color="#C99A6A"/>
    </linearGradient>
  </defs>
  <!-- Background: solid #FAF9F6 -->
  <rect width="512" height="512" fill="#FAF9F6"/>

  <!-- Wooden board: 390px, 90px radius, 60px padding -->
  <rect x="61" y="61" width="390" height="390" rx="90" ry="90" fill="url(#wood-shade)" filter="url(#board-shadow)"/>

  <!-- Paper (flyer): 210x280, -4deg, 14px radius -->
  <g transform="translate(256,256) rotate(-4) translate(-105,-140)">
    <rect x="0" y="0" width="210" height="280" rx="14" ry="14" fill="#FFFFFF" filter="url(#paper-shadow)"/>
    <!-- 2-3 subtle gray lines -->
    <line x1="28" y1="88" x2="182" y2="88" stroke="#E8EAED" stroke-width="1.5"/>
    <line x1="28" y1="140" x2="165" y2="140" stroke="#E8EAED" stroke-width="1.5"/>
    <line x1="28" y1="192" x2="148" y2="192" stroke="#E8EAED" stroke-width="1.5"/>
  </g>

  <!-- Pin: top center of tilted paper (~266, 108) -->
  <g transform="translate(266,108)">
    <circle cx="0" cy="0" r="12" fill="#F5B45C" filter="url(#pin-shadow)"/>
    <circle cx="-3" cy="-3" r="4" fill="#FFF7ED" opacity="0.7"/>
    <rect x="-1.5" y="8" width="3" height="20" rx="1" fill="#9CA3AF"/>
  </g>
</svg>
